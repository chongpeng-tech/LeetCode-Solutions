name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *" 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sync LeetCode CN
        uses: joshcai/leetcode-sync@v1.7 # 🌟 这里换成了最稳定、最主流的开源工具
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: my-leetcode-code 
          leetcode-url: https://leetcode.cn
